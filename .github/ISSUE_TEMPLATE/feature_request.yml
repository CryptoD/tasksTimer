name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share your idea clearly. If it is a large change, maintainers may want to discuss scope before implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What is awkward, missing, or hard to do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like taskTimer to behave? Sketches or mockups are welcome.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Primary surface
      description: Where should this mainly apply, if you have a preference?
      options:
        - No strong preference
        - Standalone GTK app
        - GNOME Shell extension
        - Both
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workflows, or designs you considered.
    validations:
      required: false
