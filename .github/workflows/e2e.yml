# Browser E2E shell: Playwright + MSW (@msw/playwright). Not the GTK app (see e2e/README.md).
#
# NOTE: This workflow is intentionally NOT part of the canonical PR “full suite”.
# It is path-filtered (below) to avoid silently duplicating CI workload that is already
# covered by `.github/workflows/ci.yml` on every PR.
name: E2E

on:
  push:
    paths:
      - 'e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: npm run test:e2e
        run: npm run test:e2e
