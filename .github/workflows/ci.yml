# Canonical PR workflow.
# This is the single primary PR gate for this repository (lint + unit/smoke tests).
# Any other workflows (like Playwright E2E) must be path-filtered or otherwise scoped
# so we don’t silently run duplicate “full suite” jobs on every PR.
#
# Lint and tests on every push (branches + tags) and on pull requests.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # upload-artifact (gocyclo report when go.mod exists)

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: ESLint (npm run lint)
        run: npm run lint

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dbus-daemon \
            dbus-x11 \
            gettext \
            gjs \
            gir1.2-gstreamer-1.0 \
            gir1.2-gtk-3.0 \
            shellcheck \
            xvfb

      - name: Lint
        run: make lint

      - name: Test
        run: xvfb-run -a dbus-run-session -- make test

      # Go complexity baseline (only when this repo contains a Go module).
      - uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: '1.25'

      - name: go vet (fail on findings)
        if: hashFiles('go.mod') != ''
        run: go vet ./...

      - name: gocyclo complexity report (artifact)
        if: hashFiles('go.mod') != ''
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          PATH="$PATH:$(go env GOPATH)/bin"
          gocyclo -top 50 -ignore node_modules . > gocyclo-report.txt
          test -s gocyclo-report.txt || echo "(no Go functions matched)" > gocyclo-report.txt

      - uses: actions/upload-artifact@v4
        if: hashFiles('go.mod') != ''
        with:
          name: gocyclo-complexity
          path: gocyclo-report.txt
