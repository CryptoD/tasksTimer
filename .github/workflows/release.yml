# Build AppImage and publish a GitHub Release when a version tag is pushed.
# Release notes come from the matching ## [x.y] section in CHANGELOG.md (see bin/extract_changelog_section.py).
name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: ESLint (npm run lint)
        run: npm run lint

      - name: Verify tag matches version.json
        run: python3 bin/verify_release_tag.py

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            dbus-daemon \
            dbus-x11 \
            gettext \
            gjs \
            gir1.2-gstreamer-1.0 \
            gir1.2-gtk-3.0 \
            imagemagick \
            libgtk-3-bin \
            python3 \
            rsync \
            shellcheck \
            wget \
            xvfb

      - name: Lint
        run: make lint

      - name: Test
        run: xvfb-run -a dbus-run-session -- make test

      - name: Build AppImage
        run: make appimage

      - name: List AppImage artifacts
        run: ls -la packaging/appimage/dist/

      - name: Generate checksums
        run: |
          cd packaging/appimage/dist
          sha256sum *.AppImage | tee SHA256SUMS

      - name: Prepare release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VER=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          NOTES="${{ runner.temp }}/release-notes.md"
          python3 bin/extract_changelog_section.py "$VER" > "$NOTES"
          {
            echo ""
            echo "---"
            echo "Full changelog: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md"
          } >> "$NOTES"

      - name: Stable vs pre-release (beta / rc / alpha tags)
        id: relmeta
        run: |
          TAG="${{ github.ref_name }}"
          case "$TAG" in
            *-beta*|*-rc*|*-alpha*)
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: taskTimer ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: false
          prerelease: ${{ steps.relmeta.outputs.prerelease == 'true' }}
          files: |
            packaging/appimage/dist/*.AppImage
            packaging/appimage/dist/SHA256SUMS
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
